source:
  type: oracle

target:
  catalog: lakehouse
  schema: bronze
  table: core_account

load:
  strategy: full_snapshot

sql: |
  SELECT
      account_id,
      account_no,
      customer_id,
      product_code,
      branch_code,
      account_type,
      currency,
      balance,
      open_date,
      close_date,
      status,
      last_updated
  FROM core_banking.account
