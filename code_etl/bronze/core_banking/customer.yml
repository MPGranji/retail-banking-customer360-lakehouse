source:
  type: oracle

target:
  catalog: lakehouse
  schema: bronze
  table: core_customer

load:
  strategy: full_snapshot

sql: |
  SELECT
      customer_id,
      cccd,
      full_name,
      gender,
      date_of_birth,
      phone,
      email,
      address,
      city,
      district,
      branch_code,
      customer_segment,
      kyc_status,
      register_date,
      is_active,
      last_updated
  FROM core_banking.customer
