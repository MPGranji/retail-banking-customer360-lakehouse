source:
  type: postgres

target:
  catalog: lakehouse
  schema: bronze
  table: card

load:
  strategy: full_snapshot

sql: |
  SELECT
      card_id,
      card_no_masked,
      customer_id,
      account_id,
      product_code,
      card_type,
      card_brand,
      credit_limit,
      issue_date,
      expiry_date,
      status,
      last_updated
  FROM card_crm.card
