job:
  type: scd_type2

source:
  tables:
    - bronze.core_product
  snapshot_mode: full

target:
  catalog: lakehouse
  schema: silver
  table: dim_product

business_key:
  - product_code

scd:
  type: 2
  sk_column: product_sk
  effective_from_column: effective_from
  effective_to_column: effective_to
  current_flag_column: is_current
  detect_deletes: true

tracked_columns:
  - product_name
  - product_group
  - product_type
  - currency
  - is_active
  - launch_date

sql: |
  SELECT
      product_code,
      product_name,
      product_group,
      product_type,
      currency,
      is_active,
      launch_date,
      last_updated
  FROM lakehouse.bronze.core_product
  WHERE cob_dt = DATE '{{ cob_dt }}'
