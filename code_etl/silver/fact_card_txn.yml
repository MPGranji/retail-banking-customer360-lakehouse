job:
  type: fact_txn

source:
  tables:
    - bronze.card_txn
    - silver.dim_customer

target:
  catalog: lakehouse
  schema: silver
  table: fact_card_txn

business_key:
  - txn_id

load:
  mode: daily
  partition_column: cob_dt

sql: |
  SELECT
      t.txn_id,
      t.card_id,
      t.customer_id,
      c.customer_sk,
      t.txn_date,
      t.txn_amount,
      t.txn_type,
      t.currency,
      t.merchant_name,
      t.merchant_category,
      t.channel,
      t.status,
      t.created_ts,
      t.cob_dt
  FROM lakehouse.bronze.card_txn t
  LEFT JOIN lakehouse.silver.dim_customer c
      ON t.customer_id = c.customer_id
      AND CAST(t.txn_date AS DATE) BETWEEN c.effective_from AND c.effective_to
  WHERE t.cob_dt = DATE '{{ cob_dt }}'
