job:
  type: scd_type1

source:
  tables:
    - bronze.card

target:
  catalog: lakehouse
  schema: silver
  table: dim_card

business_key:
  - card_id

sql: |
  SELECT
      card_id,
      card_no_masked,
      customer_id,
      account_id,
      product_code,
      card_type,
      card_brand,
      credit_limit,
      issue_date,
      expiry_date,
      status,
      last_updated
  FROM lakehouse.bronze.card
  WHERE cob_dt = DATE '{{ cob_dt }}'
