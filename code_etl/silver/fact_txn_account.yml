job:
  type: fact_txn

source:
  tables:
    - bronze.core_txn_account
    - silver.dim_account
    - silver.dim_customer

target:
  catalog: lakehouse
  schema: silver
  table: fact_txn_account

business_key:
  - txn_id

load:
  mode: daily
  partition_column: cob_dt

sql: |
  SELECT
      t.txn_id,
      t.account_id,
      a.account_sk,
      t.customer_id,
      c.customer_sk,
      t.txn_date,
      t.txn_amount,
      t.txn_type,
      t.debit_credit,
      t.balance_after,
      t.channel,
      t.description,
      t.counter_account,
      t.created_ts,
      t.cob_dt
  FROM lakehouse.bronze.core_txn_account t
  LEFT JOIN lakehouse.silver.dim_account a
      ON t.account_id = a.account_id
      AND CAST(t.txn_date AS DATE) BETWEEN a.effective_from AND a.effective_to
  LEFT JOIN lakehouse.silver.dim_customer c
      ON t.customer_id = c.customer_id
      AND CAST(t.txn_date AS DATE) BETWEEN c.effective_from AND c.effective_to
  WHERE t.cob_dt = DATE '{{ cob_dt }}'
