job:
  type: scd_type2

source:
  tables:
    - bronze.core_branch
  snapshot_mode: full

target:
  catalog: lakehouse
  schema: silver
  table: dim_branch

business_key:
  - branch_code

scd:
  type: 2
  sk_column: branch_sk
  effective_from_column: effective_from
  effective_to_column: effective_to
  current_flag_column: is_current
  detect_deletes: true

tracked_columns:
  - branch_name
  - region
  - city
  - district
  - address
  - manager_name
  - open_date
  - status

sql: |
  SELECT
      branch_code,
      branch_name,
      region,
      city,
      district,
      address,
      manager_name,
      open_date,
      status,
      last_updated
  FROM lakehouse.bronze.core_branch
  WHERE cob_dt = DATE '{{ cob_dt }}'
