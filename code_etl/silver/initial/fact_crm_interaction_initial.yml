job:
  type: fact_txn

source:
  tables:
    - bronze.crm_interaction
    - silver.dim_customer

target:
  catalog: lakehouse
  schema: silver
  table: fact_crm_interaction

business_key:
  - interaction_id

load:
  mode: initial
  partition_column: cob_dt
  bootstrap_dimension_rule: earliest_known_version_before_first_effective_date

sql: |
  WITH customer_versions AS (
      SELECT c.*,
             MIN(effective_from) OVER (PARTITION BY customer_id) AS first_effective_from
      FROM lakehouse.silver.dim_customer c
  )
  SELECT
      i.interaction_id,
      i.customer_id,
      c.customer_sk,
      i.interaction_date,
      i.channel,
      i.direction,
      i.subject,
      i.category,
      i.status,
      i.assigned_to,
      i.created_ts,
      i.cob_dt
  FROM lakehouse.bronze.crm_interaction i
  LEFT JOIN customer_versions c
      ON i.customer_id = c.customer_id
      AND (
          CAST(i.interaction_date AS DATE) BETWEEN c.effective_from AND c.effective_to
          OR (
              CAST(i.interaction_date AS DATE) < c.first_effective_from
              AND c.effective_from = c.first_effective_from
          )
      )
