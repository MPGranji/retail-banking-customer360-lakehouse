job:
  type: fact_txn

source:
  tables:
    - bronze.core_txn_account
    - silver.dim_account
    - silver.dim_customer

target:
  catalog: lakehouse
  schema: silver
  table: fact_txn_account

business_key:
  - txn_id

load:
  mode: initial
  partition_column: cob_dt
  bootstrap_dimension_rule: earliest_known_version_before_first_effective_date

sql: |
  WITH account_versions AS (
      SELECT a.*,
             MIN(effective_from) OVER (PARTITION BY account_id) AS first_effective_from
      FROM lakehouse.silver.dim_account a
  ),
  customer_versions AS (
      SELECT c.*,
             MIN(effective_from) OVER (PARTITION BY customer_id) AS first_effective_from
      FROM lakehouse.silver.dim_customer c
  )
  SELECT
      t.txn_id,
      t.account_id,
      a.account_sk,
      t.customer_id,
      c.customer_sk,
      t.txn_date,
      t.txn_amount,
      t.txn_type,
      t.debit_credit,
      t.balance_after,
      t.channel,
      t.description,
      t.counter_account,
      t.created_ts,
      t.cob_dt
  FROM lakehouse.bronze.core_txn_account t
  LEFT JOIN account_versions a
      ON t.account_id = a.account_id
      AND (
          CAST(t.txn_date AS DATE) BETWEEN a.effective_from AND a.effective_to
          OR (
              CAST(t.txn_date AS DATE) < a.first_effective_from
              AND a.effective_from = a.first_effective_from
          )
      )
  LEFT JOIN customer_versions c
      ON t.customer_id = c.customer_id
      AND (
          CAST(t.txn_date AS DATE) BETWEEN c.effective_from AND c.effective_to
          OR (
              CAST(t.txn_date AS DATE) < c.first_effective_from
              AND c.effective_from = c.first_effective_from
          )
      )
