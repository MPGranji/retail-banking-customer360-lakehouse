# Bronze Full Snapshot Template
# Use for master/reference tables (customer, account, product, etc.)

source:
  type: oracle  # or postgres

target:
  catalog: lakehouse
  schema: bronze
  table: core_customer

load:
  strategy: full_snapshot

sql: |
  SELECT
      a.*,
      DATE '{{ cob_dt }}' AS cob_dt
  FROM core.customer a
