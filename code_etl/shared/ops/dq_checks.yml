result_table: opslakehouse.dq_check_result

checks:
  - name: mart_customer_360_current_contract
    schema: gold
    table: mart_customer_360
    severity: critical
    check_type: uniqueness
    sql: |
      WITH duplicate_keys AS (
          SELECT customer_id
          FROM lakehouse.gold.mart_customer_360
          GROUP BY customer_id
          HAVING COUNT(*) > 1
      )
      SELECT CAST(
                 (SELECT COUNT(*) FROM duplicate_keys)
                 + SUM(CASE WHEN cob_dt <> DATE '{{ cob_dt }}' THEN 1 ELSE 0 END)
                 + CASE WHEN COUNT(*) = 0 THEN 1 ELSE 0 END
             AS BIGINT) AS failed_count,
             CAST(COUNT(*) AS BIGINT) AS total_count
      FROM lakehouse.gold.mart_customer_360

  - name: scd2_single_current_row
    schema: silver
    table: dim_customer,dim_account,dim_product,dim_branch
    severity: critical
    check_type: scd2_current
    sql: |
      WITH violations AS (
          SELECT customer_id AS business_key FROM lakehouse.silver.dim_customer
          WHERE is_current = 1 GROUP BY customer_id HAVING COUNT(*) > 1
          UNION ALL
          SELECT account_id FROM lakehouse.silver.dim_account
          WHERE is_current = 1 GROUP BY account_id HAVING COUNT(*) > 1
          UNION ALL
          SELECT product_code FROM lakehouse.silver.dim_product
          WHERE is_current = 1 GROUP BY product_code HAVING COUNT(*) > 1
          UNION ALL
          SELECT branch_code FROM lakehouse.silver.dim_branch
          WHERE is_current = 1 GROUP BY branch_code HAVING COUNT(*) > 1
      ), population AS (
          SELECT COUNT(*) AS n FROM lakehouse.silver.dim_customer
          UNION ALL SELECT COUNT(*) FROM lakehouse.silver.dim_account
          UNION ALL SELECT COUNT(*) FROM lakehouse.silver.dim_product
          UNION ALL SELECT COUNT(*) FROM lakehouse.silver.dim_branch
      )
      SELECT CAST((SELECT COUNT(*) FROM violations) AS BIGINT) AS failed_count,
             CAST((SELECT SUM(n) FROM population) AS BIGINT) AS total_count

  - name: scd2_no_effective_range_overlap
    schema: silver
    table: dim_customer,dim_account,dim_product,dim_branch
    severity: critical
    check_type: scd2_overlap
    sql: |
      WITH violations AS (
          SELECT a.customer_id FROM lakehouse.silver.dim_customer a
          JOIN lakehouse.silver.dim_customer b ON a.customer_id = b.customer_id
           AND a.effective_from < b.effective_from AND b.effective_from <= a.effective_to
          UNION ALL
          SELECT a.account_id FROM lakehouse.silver.dim_account a
          JOIN lakehouse.silver.dim_account b ON a.account_id = b.account_id
           AND a.effective_from < b.effective_from AND b.effective_from <= a.effective_to
          UNION ALL
          SELECT a.product_code FROM lakehouse.silver.dim_product a
          JOIN lakehouse.silver.dim_product b ON a.product_code = b.product_code
           AND a.effective_from < b.effective_from AND b.effective_from <= a.effective_to
          UNION ALL
          SELECT a.branch_code FROM lakehouse.silver.dim_branch a
          JOIN lakehouse.silver.dim_branch b ON a.branch_code = b.branch_code
           AND a.effective_from < b.effective_from AND b.effective_from <= a.effective_to
      )
      SELECT CAST(COUNT(*) AS BIGINT) AS failed_count, CAST(COUNT(*) AS BIGINT) AS total_count
      FROM violations

  - name: scd2_valid_ranges_and_current_expiry
    schema: silver
    table: dim_customer,dim_account,dim_product,dim_branch
    severity: critical
    check_type: scd2_range
    sql: |
      WITH rows AS (
          SELECT effective_from, effective_to, is_current FROM lakehouse.silver.dim_customer
          UNION ALL SELECT effective_from, effective_to, is_current FROM lakehouse.silver.dim_account
          UNION ALL SELECT effective_from, effective_to, is_current FROM lakehouse.silver.dim_product
          UNION ALL SELECT effective_from, effective_to, is_current FROM lakehouse.silver.dim_branch
      )
      SELECT CAST(SUM(CASE WHEN effective_from > effective_to
                                OR (is_current = 1 AND effective_to <> DATE '9999-12-31')
                           THEN 1 ELSE 0 END) AS BIGINT) AS failed_count,
             CAST(COUNT(*) AS BIGINT) AS total_count
      FROM rows

  - name: fact_surrogate_keys_not_orphan
    schema: silver
    table: fact_txn_account,fact_card_txn,fact_crm_interaction
    severity: critical
    check_type: referential
    sql: |
      WITH rows AS (
          SELECT CASE WHEN account_sk IS NULL OR customer_sk IS NULL THEN 1 ELSE 0 END AS failed
          FROM lakehouse.silver.fact_txn_account
          UNION ALL
          SELECT CASE WHEN customer_sk IS NULL THEN 1 ELSE 0 END FROM lakehouse.silver.fact_card_txn
          UNION ALL
          SELECT CASE WHEN customer_sk IS NULL THEN 1 ELSE 0 END FROM lakehouse.silver.fact_crm_interaction
      )
      SELECT CAST(SUM(failed) AS BIGINT) AS failed_count, CAST(COUNT(*) AS BIGINT) AS total_count
      FROM rows

  - name: business_flags_are_binary
    schema: gold
    table: mart_customer_360,churn_prediction,cross_sell_segment
    severity: critical
    check_type: range
    sql: |
      WITH rows AS (
          SELECT CASE WHEN has_credit_card NOT IN (0,1) OR has_savings NOT IN (0,1)
                                OR has_loan NOT IN (0,1) OR churn_flag NOT IN (0,1)
                                OR cross_sell_credit_card_flag NOT IN (0,1)
                           THEN 1 ELSE 0 END AS failed
          FROM lakehouse.gold.mart_customer_360
          UNION ALL
          SELECT CASE WHEN is_churn_candidate NOT IN (0,1) THEN 1 ELSE 0 END
          FROM lakehouse.gold.churn_prediction WHERE cob_dt = DATE '{{ cob_dt }}'
          UNION ALL
          SELECT CASE WHEN no_credit_card NOT IN (0,1) OR no_deposit NOT IN (0,1)
                                OR no_loan NOT IN (0,1) THEN 1 ELSE 0 END
          FROM lakehouse.gold.cross_sell_segment WHERE cob_dt = DATE '{{ cob_dt }}'
      )
      SELECT CAST(SUM(failed) AS BIGINT) AS failed_count, CAST(COUNT(*) AS BIGINT) AS total_count
      FROM rows

  - name: rfm_scores_in_valid_range
    schema: gold
    table: rfm_segment
    severity: critical
    check_type: range
    sql: |
      SELECT CAST(SUM(CASE WHEN r_score NOT BETWEEN 1 AND 5
                                OR f_score NOT BETWEEN 1 AND 5
                                OR m_score NOT BETWEEN 1 AND 5
                                OR rfm_score NOT BETWEEN 3 AND 15
                           THEN 1 ELSE 0 END) AS BIGINT) AS failed_count,
             CAST(COUNT(*) AS BIGINT) AS total_count
      FROM lakehouse.gold.rfm_segment
      WHERE cob_dt = DATE '{{ cob_dt }}'

  - name: campaign_unique_customer_date
    schema: gold
    table: campaign_target
    severity: critical
    check_type: uniqueness
    sql: |
      WITH duplicate_keys AS (
          SELECT customer_id, cob_dt
          FROM lakehouse.gold.campaign_target
          WHERE cob_dt = DATE '{{ cob_dt }}'
          GROUP BY customer_id, cob_dt
          HAVING COUNT(*) > 1
      )
      SELECT CAST(COUNT(*) + CASE WHEN
                 (SELECT COUNT(*) FROM lakehouse.gold.campaign_target
                  WHERE cob_dt = DATE '{{ cob_dt }}') = 0 THEN 1 ELSE 0 END AS BIGINT) AS failed_count,
             CAST((SELECT COUNT(*) FROM lakehouse.gold.campaign_target
                   WHERE cob_dt = DATE '{{ cob_dt }}') AS BIGINT) AS total_count
      FROM duplicate_keys

  - name: nbo_contract_is_valid
    schema: gold
    table: campaign_target
    severity: critical
    check_type: nbo_contract
    sql: |
      SELECT CAST(SUM(CASE
                    WHEN cross_sell_score IS NULL OR cross_sell_score NOT BETWEEN 0 AND 100
                      OR recommended_product IS NULL OR TRIM(recommended_product) = ''
                      OR recommendation_reason IS NULL OR TRIM(recommendation_reason) = ''
                      OR campaign_priority IS NULL OR campaign_priority NOT IN ('HIGH', 'MEDIUM', 'LOW')
                      OR contact_eligible_flag IS NULL OR contact_eligible_flag NOT IN (0, 1)
                      OR (contact_eligible_flag = 1 AND suppression_reason IS NOT NULL)
                      OR (contact_eligible_flag = 0 AND suppression_reason IS NULL)
                    THEN 1 ELSE 0 END) AS BIGINT) AS failed_count,
             CAST(COUNT(*) AS BIGINT) AS total_count
      FROM lakehouse.gold.campaign_target
      WHERE cob_dt = DATE '{{ cob_dt }}'

  - name: segmentation_population_matches_current
    schema: gold
    table: rfm_segment,churn_prediction,cross_sell_segment,campaign_target
    severity: critical
    check_type: population
    sql: |
      WITH expected AS (
          SELECT COUNT(*) AS n FROM lakehouse.gold.mart_customer_360
          WHERE cob_dt = DATE '{{ cob_dt }}'
      ), populations AS (
          SELECT COUNT(*) AS n FROM lakehouse.gold.rfm_segment WHERE cob_dt = DATE '{{ cob_dt }}'
          UNION ALL SELECT COUNT(*) FROM lakehouse.gold.churn_prediction WHERE cob_dt = DATE '{{ cob_dt }}'
          UNION ALL SELECT COUNT(*) FROM lakehouse.gold.cross_sell_segment WHERE cob_dt = DATE '{{ cob_dt }}'
          UNION ALL SELECT COUNT(*) FROM lakehouse.gold.campaign_target WHERE cob_dt = DATE '{{ cob_dt }}'
      )
      SELECT CAST(SUM(ABS(p.n - e.n)) AS BIGINT) AS failed_count,
             CAST(e.n * 4 AS BIGINT) AS total_count
      FROM populations p CROSS JOIN expected e
      GROUP BY e.n

  - name: gold_customer_population_matches_silver
    schema: gold
    table: mart_customer_360
    severity: critical
    check_type: population
    sql: |
      WITH expected AS (
          SELECT customer_id FROM lakehouse.silver.dim_customer
          WHERE DATE '{{ cob_dt }}' BETWEEN effective_from AND effective_to
      ), actual AS (
          SELECT customer_id FROM lakehouse.gold.mart_customer_360
          WHERE cob_dt = DATE '{{ cob_dt }}'
      ), mismatch AS (
          SELECT COALESCE(e.customer_id, a.customer_id) AS customer_id
          FROM expected e FULL OUTER JOIN actual a ON e.customer_id = a.customer_id
          WHERE e.customer_id IS NULL OR a.customer_id IS NULL
      )
      SELECT CAST(COUNT(*) AS BIGINT) AS failed_count,
             CAST((SELECT COUNT(*) FROM expected) AS BIGINT) AS total_count
      FROM mismatch

  - name: aum_reconciles_to_independent_sources
    schema: gold
    table: mart_customer_360
    severity: critical
    check_type: reconciliation
    sql: |
      WITH customers AS (
          SELECT customer_id FROM lakehouse.silver.dim_customer
          WHERE DATE '{{ cob_dt }}' BETWEEN effective_from AND effective_to
      ), account_agg AS (
          SELECT customer_id,
                 SUM(CASE WHEN status = 'ACTIVE' THEN balance ELSE CAST(0 AS DECIMAL(18,2)) END) AS account_balance
          FROM lakehouse.silver.dim_account
          WHERE DATE '{{ cob_dt }}' BETWEEN effective_from AND effective_to
          GROUP BY customer_id
      ), deposit_agg AS (
          SELECT customer_id,
                 SUM(CASE WHEN status = 'ACTIVE' THEN principal_amount ELSE CAST(0 AS DECIMAL(18,2)) END) AS deposit_balance
          FROM lakehouse.silver.dim_deposit GROUP BY customer_id
      ), loan_agg AS (
          SELECT customer_id,
                 SUM(CASE WHEN loan_status = 'ACTIVE' THEN outstanding_balance ELSE CAST(0 AS DECIMAL(18,2)) END) AS loan_balance
          FROM lakehouse.silver.dim_loan GROUP BY customer_id
      ), expected AS (
          SELECT c.customer_id,
                 COALESCE(a.account_balance, 0) + COALESCE(d.deposit_balance, 0) AS aum_total,
                 COALESCE(l.loan_balance, 0) AS loan_total
          FROM customers c
          LEFT JOIN account_agg a ON c.customer_id = a.customer_id
          LEFT JOIN deposit_agg d ON c.customer_id = d.customer_id
          LEFT JOIN loan_agg l ON c.customer_id = l.customer_id
      ), mismatch AS (
          SELECT e.customer_id
          FROM expected e JOIN lakehouse.gold.mart_customer_360 m ON e.customer_id = m.customer_id
          WHERE m.cob_dt = DATE '{{ cob_dt }}'
            AND (m.aum_total <> CAST(e.aum_total AS DECIMAL(18,2))
                 OR m.total_loan_outstanding <> CAST(e.loan_total AS DECIMAL(18,2)))
      )
      SELECT CAST(COUNT(*) AS BIGINT) AS failed_count,
             CAST((SELECT COUNT(*) FROM expected) AS BIGINT) AS total_count
      FROM mismatch

  - name: masked_mart_matches_gold_current
    schema: sandbox
    table: mart_customer_360_masked
    severity: critical
    check_type: population
    sql: |
      WITH gold AS (
          SELECT customer_id FROM lakehouse.gold.mart_customer_360
          WHERE cob_dt = DATE '{{ cob_dt }}'
      ), masked AS (
          SELECT customer_id FROM lakehouse.sandbox.mart_customer_360_masked
          WHERE cob_dt = DATE '{{ cob_dt }}'
      ), mismatch AS (
          SELECT COALESCE(g.customer_id, m.customer_id) AS customer_id
          FROM gold g FULL OUTER JOIN masked m ON g.customer_id = m.customer_id
          WHERE g.customer_id IS NULL OR m.customer_id IS NULL
      )
      SELECT CAST(COUNT(*) AS BIGINT) AS failed_count,
             CAST((SELECT COUNT(*) FROM gold) AS BIGINT) AS total_count
      FROM mismatch

  - name: masked_mart_has_no_raw_pii_columns
    schema: sandbox
    table: mart_customer_360_masked
    severity: critical
    check_type: schema_columns_absent
    forbidden_columns: [full_name, phone, email, cccd, address]

  - name: all_rfm_segments_reachable
    schema: gold
    table: rfm_segment
    severity: warning
    check_type: segment_population
    sql: |
      SELECT CAST(7 - COUNT(DISTINCT rfm_segment) AS BIGINT) AS failed_count,
             CAST(COUNT(*) AS BIGINT) AS total_count
      FROM lakehouse.gold.rfm_segment
      WHERE cob_dt = DATE '{{ cob_dt }}'
