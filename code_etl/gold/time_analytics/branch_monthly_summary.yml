job:
  type: time_analytics

source:
  tables:
    - silver.dim_branch
    - silver.dim_account
    - silver.fact_txn_account

target:
  catalog: lakehouse
  schema: gold
  table: mart_branch_monthly_summary

upstream_flags:
  - silver.dim_branch
  - silver.dim_account
  - silver.fact_txn_account

sql: |
  WITH txn_monthly AS (
      -- Giao dịch tài khoản tổng hợp theo chi nhánh và tháng
      SELECT
          da.branch_code,
          YEAR(CAST(t.txn_date AS DATE))                    AS txn_year,
          MONTH(CAST(t.txn_date AS DATE))                   AS txn_month,
          COUNT(DISTINCT t.customer_id)                     AS active_customers,
          COUNT(t.txn_id)                                   AS txn_count,
          COALESCE(SUM(ABS(t.txn_amount)), 0)               AS total_txn_amount,
          COALESCE(AVG(ABS(t.txn_amount)), 0)               AS avg_txn_amount,
          COALESCE(SUM(CASE WHEN t.debit_credit = 'C'
                            THEN t.txn_amount ELSE 0 END), 0) AS total_credit_amount,
          COALESCE(SUM(CASE WHEN t.debit_credit = 'D'
                            THEN t.txn_amount ELSE 0 END), 0) AS total_debit_amount
      FROM lakehouse.silver.fact_txn_account t
      JOIN lakehouse.silver.dim_account da
          ON  t.account_id   = da.account_id
          AND da.is_current  = 1
      GROUP BY
          da.branch_code,
          YEAR(CAST(t.txn_date AS DATE)),
          MONTH(CAST(t.txn_date AS DATE))
  ),

  channel_ranked AS (
      -- Kênh giao dịch phổ biến nhất theo chi nhánh-tháng
      SELECT
          da.branch_code,
          YEAR(CAST(t.txn_date AS DATE))                    AS txn_year,
          MONTH(CAST(t.txn_date AS DATE))                   AS txn_month,
          t.channel,
          COUNT(*)                                          AS channel_cnt,
          ROW_NUMBER() OVER (
              PARTITION BY
                  da.branch_code,
                  YEAR(CAST(t.txn_date AS DATE)),
                  MONTH(CAST(t.txn_date AS DATE))
              ORDER BY COUNT(*) DESC
          )                                                 AS rn
      FROM lakehouse.silver.fact_txn_account t
      JOIN lakehouse.silver.dim_account da
          ON  t.account_id   = da.account_id
          AND da.is_current  = 1
      GROUP BY
          da.branch_code,
          YEAR(CAST(t.txn_date AS DATE)),
          MONTH(CAST(t.txn_date AS DATE)),
          t.channel
  ),

  top_channel AS (
      SELECT branch_code, txn_year, txn_month, channel AS top_channel
      FROM channel_ranked
      WHERE rn = 1
  )

  SELECT
      m.branch_code,
      db.branch_name,
      db.region,
      db.city,
      m.txn_year,
      m.txn_month,
      CASE
          WHEN m.txn_month IN (1, 2, 3)  THEN 1
          WHEN m.txn_month IN (4, 5, 6)  THEN 2
          WHEN m.txn_month IN (7, 8, 9)  THEN 3
          ELSE                                4
      END                                                  AS txn_quarter,
      m.active_customers,
      m.txn_count,
      ROUND(m.total_txn_amount,  2)                        AS total_txn_amount,
      ROUND(m.avg_txn_amount,    2)                        AS avg_txn_amount,
      ROUND(m.total_credit_amount, 2)                      AS total_credit_amount,
      ROUND(m.total_debit_amount,  2)                      AS total_debit_amount,
      tc.top_channel,
      -- Partition column
      DATE '{{ cob_dt }}'                                  AS cob_dt
  FROM txn_monthly m
  LEFT JOIN lakehouse.silver.dim_branch db
      ON  m.branch_code = db.branch_code
  LEFT JOIN top_channel tc
      ON  m.branch_code = tc.branch_code
      AND m.txn_year    = tc.txn_year
      AND m.txn_month   = tc.txn_month
