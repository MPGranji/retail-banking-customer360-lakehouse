job:
  type: mart360

source:
  tables:
    - silver.dim_customer
    - silver.fact_txn_account
    - silver.fact_card_txn

target:
  catalog: lakehouse
  schema: gold
  table: customer_transaction_summary

write:
  strategy: overwrite_partitions

upstream_flags:
  - silver.dim_customer
  - silver.fact_txn_account
  - silver.fact_card_txn

sql: |
  WITH acct_txn AS (
      SELECT
          t.customer_id,
          COUNT(t.txn_id)                                                                    AS acct_txn_count_30d,
          COALESCE(SUM(ABS(t.txn_amount)), 0)                                               AS acct_txn_amount_30d,
          -- debit_credit = 'C' là tiền vào, 'D' là tiền ra
          COUNT(CASE WHEN t.debit_credit = 'C' THEN t.txn_id END)                          AS acct_credit_count_30d,
          COUNT(CASE WHEN t.debit_credit = 'D' THEN t.txn_id END)                          AS acct_debit_count_30d,
          COALESCE(SUM(CASE WHEN t.debit_credit = 'C' THEN t.txn_amount END), 0)           AS acct_credit_amount_30d,
          COALESCE(SUM(CASE WHEN t.debit_credit = 'D' THEN ABS(t.txn_amount) END), 0)     AS acct_debit_amount_30d,
          MAX(t.txn_date)                                                                   AS last_acct_txn_date
      FROM lakehouse.silver.fact_txn_account t
      WHERE CAST(t.txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -30)
        AND CAST(t.txn_date AS DATE) <= DATE '{{ cob_dt }}'
      GROUP BY t.customer_id
  ),
  card_txn AS (
      SELECT
          ct.customer_id,
          COUNT(ct.txn_id)                                                                   AS card_txn_count_30d,
          COALESCE(SUM(CASE WHEN ct.txn_type NOT IN ('REFUND','REVERSAL')
                            THEN ct.txn_amount ELSE 0 END), 0)                              AS card_txn_amount_30d,
          MAX(ct.txn_date)                                                                  AS last_card_txn_date
      FROM lakehouse.silver.fact_card_txn ct
      WHERE CAST(ct.txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -30)
        AND CAST(ct.txn_date AS DATE) <= DATE '{{ cob_dt }}'
        AND ct.status = 'SUCCESS'
        AND ct.txn_type NOT IN ('REFUND', 'REVERSAL')
      GROUP BY ct.customer_id
  )
  SELECT
      c.customer_id,
      c.customer_sk,
      -- Account transactions
      COALESCE(at.acct_txn_count_30d, 0)                                                   AS acct_txn_count_30d,
      CAST(ROUND(COALESCE(at.acct_txn_amount_30d, 0), 2) AS DECIMAL(18,2))                AS acct_txn_amount_30d,
      COALESCE(at.acct_credit_count_30d, 0)                                                AS acct_credit_count_30d,
      COALESCE(at.acct_debit_count_30d, 0)                                                 AS acct_debit_count_30d,
      CAST(ROUND(COALESCE(at.acct_credit_amount_30d, 0), 2) AS DECIMAL(18,2))              AS acct_credit_amount_30d,
      CAST(ROUND(COALESCE(at.acct_debit_amount_30d, 0), 2) AS DECIMAL(18,2))               AS acct_debit_amount_30d,
      -- Card transactions
      COALESCE(ct.card_txn_count_30d, 0)                                                   AS card_txn_count_30d,
      CAST(ROUND(COALESCE(ct.card_txn_amount_30d, 0), 2) AS DECIMAL(18,2))                 AS card_txn_amount_30d,
      -- Combined
      COALESCE(at.acct_txn_count_30d, 0) + COALESCE(ct.card_txn_count_30d, 0)            AS total_txn_count_30d,
      CAST(ROUND(COALESCE(at.acct_txn_amount_30d, 0) + COALESCE(ct.card_txn_amount_30d, 0), 2)
           AS DECIMAL(18,2))                                                               AS total_txn_amount_30d,
      -- Last txn date (lấy gần nhất giữa 2 nguồn)
      GREATEST(
          COALESCE(at.last_acct_txn_date, TIMESTAMP '1900-01-01 00:00:00'),
          COALESCE(ct.last_card_txn_date,  TIMESTAMP '1900-01-01 00:00:00')
      )                                                                                    AS last_txn_date,
      DATE '{{ cob_dt }}'                                                                         AS cob_dt
  FROM lakehouse.silver.dim_customer c
  LEFT JOIN acct_txn at ON c.customer_id = at.customer_id
  LEFT JOIN card_txn ct ON c.customer_id = ct.customer_id
  WHERE DATE '{{ cob_dt }}' BETWEEN c.effective_from AND c.effective_to
