job:
  type: mart360

source:
  tables:
    - silver.dim_customer
    - silver.dim_account
    - silver.dim_card
    - silver.dim_deposit
    - silver.dim_loan
    - silver.fact_txn_account
    - silver.fact_card_txn
    - silver.fact_crm_interaction

target:
  catalog: lakehouse
  schema: gold
  table: mart_customer_360_history

write:
  strategy: overwrite_partitions

upstream_flags:
  - silver.dim_customer
  - silver.dim_account
  - silver.dim_card
  - silver.dim_deposit
  - silver.dim_loan
  - silver.fact_txn_account
  - silver.fact_card_txn
  - silver.fact_crm_interaction

sql: |
  WITH customers AS (
      SELECT
          customer_id,
          customer_sk,
          full_name,
          gender,
          date_of_birth,
          branch_code AS primary_branch_code,
          customer_segment,
          kyc_status,
          register_date
      FROM lakehouse.silver.dim_customer
      WHERE DATE '{{ cob_dt }}' BETWEEN effective_from AND effective_to
  ),
  account_agg AS (
      SELECT
          customer_id,
          COUNT(DISTINCT account_id) AS total_accounts,
          SUM(CASE WHEN status = 'ACTIVE' THEN balance ELSE 0 END) AS total_account_balance
      FROM lakehouse.silver.dim_account
      WHERE DATE '{{ cob_dt }}' BETWEEN effective_from AND effective_to
      GROUP BY customer_id
  ),
  deposit_agg AS (
      SELECT
          customer_id,
          COUNT(DISTINCT deposit_id) AS total_deposits,
          COUNT(DISTINCT CASE WHEN status = 'ACTIVE' THEN deposit_id END) AS active_deposits,
          SUM(CASE WHEN status = 'ACTIVE' THEN principal_amount ELSE 0 END) AS total_deposit_principal
      FROM lakehouse.silver.dim_deposit
      GROUP BY customer_id
  ),
  loan_agg AS (
      SELECT
          customer_id,
          COUNT(DISTINCT loan_id) AS total_loans,
          COUNT(DISTINCT CASE WHEN loan_status = 'ACTIVE' THEN loan_id END) AS active_loans,
          SUM(CASE WHEN loan_status = 'ACTIVE' THEN outstanding_balance ELSE 0 END)
              AS total_loan_outstanding
      FROM lakehouse.silver.dim_loan
      GROUP BY customer_id
  ),
  card_agg AS (
      SELECT
          customer_id,
          COUNT(DISTINCT card_id) AS total_cards,
          COUNT(DISTINCT CASE WHEN card_type = 'CREDIT' AND status = 'ACTIVE' THEN card_id END)
              AS active_credit_cards
      FROM lakehouse.silver.dim_card
      GROUP BY customer_id
  ),
  account_txn_30d AS (
      SELECT
          customer_id,
          COUNT(txn_id) AS txn_count_30d,
          SUM(ABS(txn_amount)) AS txn_amount_30d
      FROM lakehouse.silver.fact_txn_account
      WHERE CAST(txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -30)
        AND CAST(txn_date AS DATE) <= DATE '{{ cob_dt }}'
      GROUP BY customer_id
  ),
  card_txn_30d AS (
      SELECT
          customer_id,
          COUNT(txn_id) AS txn_count_30d,
          SUM(txn_amount) AS txn_amount_30d
      FROM lakehouse.silver.fact_card_txn
      WHERE CAST(txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -30)
        AND CAST(txn_date AS DATE) <= DATE '{{ cob_dt }}'
        AND status = 'SUCCESS'
        AND txn_type NOT IN ('REFUND', 'REVERSAL')
      GROUP BY customer_id
  ),
  channel_ranked AS (
      SELECT
          customer_id,
          channel,
          COUNT(*) AS channel_count,
          ROW_NUMBER() OVER (
              PARTITION BY customer_id
              ORDER BY COUNT(*) DESC, channel ASC
          ) AS row_num
      FROM lakehouse.silver.fact_txn_account
      WHERE CAST(txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -30)
        AND CAST(txn_date AS DATE) <= DATE '{{ cob_dt }}'
      GROUP BY customer_id, channel
  ),
  primary_channel AS (
      SELECT customer_id, channel AS primary_channel
      FROM channel_ranked
      WHERE row_num = 1
  ),
  crm_agg AS (
      SELECT
          customer_id,
          COUNT(interaction_id) AS interaction_count_90d,
          MAX(interaction_date) AS last_interaction_date
      FROM lakehouse.silver.fact_crm_interaction
      WHERE CAST(interaction_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -90)
        AND CAST(interaction_date AS DATE) <= DATE '{{ cob_dt }}'
      GROUP BY customer_id
  ),
  account_activity AS (
      SELECT
          customer_id,
          MAX(txn_date) AS last_txn_date,
          COUNT(CASE WHEN CAST(txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -90)
                     THEN txn_id END) AS frequency_90d,
          SUM(CASE WHEN CAST(txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -90)
                   THEN ABS(txn_amount) ELSE 0 END) AS monetary_90d
      FROM lakehouse.silver.fact_txn_account
      WHERE CAST(txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -365)
        AND CAST(txn_date AS DATE) <= DATE '{{ cob_dt }}'
      GROUP BY customer_id
  ),
  card_activity AS (
      SELECT
          customer_id,
          MAX(txn_date) AS last_txn_date,
          COUNT(CASE WHEN CAST(txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -90)
                     THEN txn_id END) AS frequency_90d,
          SUM(CASE WHEN CAST(txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -90)
                   THEN txn_amount ELSE 0 END) AS monetary_90d
      FROM lakehouse.silver.fact_card_txn
      WHERE CAST(txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -365)
        AND CAST(txn_date AS DATE) <= DATE '{{ cob_dt }}'
        AND status = 'SUCCESS'
        AND txn_type NOT IN ('REFUND', 'REVERSAL')
      GROUP BY customer_id
  ),
  combined AS (
      SELECT
          c.customer_id,
          c.customer_sk,
          c.full_name,
          c.gender,
          c.date_of_birth,
          c.primary_branch_code,
          c.customer_segment,
          c.kyc_status,
          c.register_date,
          COALESCE(a.total_accounts, 0) AS total_accounts,
          COALESCE(cd.total_cards, 0) AS total_cards,
          COALESCE(l.total_loans, 0) AS total_loans,
          CASE WHEN COALESCE(cd.active_credit_cards, 0) > 0 THEN 1 ELSE 0 END AS has_credit_card,
          CASE WHEN COALESCE(d.active_deposits, 0) > 0 THEN 1 ELSE 0 END AS has_savings,
          CASE WHEN COALESCE(l.active_loans, 0) > 0 THEN 1 ELSE 0 END AS has_loan,
          COALESCE(a.total_account_balance, 0) + COALESCE(d.total_deposit_principal, 0)
              AS total_deposit_balance,
          COALESCE(l.total_loan_outstanding, 0) AS total_loan_outstanding,
          COALESCE(at.txn_count_30d, 0) + COALESCE(ct.txn_count_30d, 0) AS txn_count_30d,
          COALESCE(at.txn_amount_30d, 0) + COALESCE(ct.txn_amount_30d, 0) AS txn_amount_30d,
          GREATEST(
              COALESCE(aa.last_txn_date, TIMESTAMP '1900-01-01 00:00:00'),
              COALESCE(ca.last_txn_date, TIMESTAMP '1900-01-01 00:00:00')
          ) AS last_txn_date,
          COALESCE(pc.primary_channel, 'UNKNOWN') AS primary_channel,
          COALESCE(crm.interaction_count_90d, 0) AS interaction_count_90d,
          crm.last_interaction_date,
          COALESCE(aa.frequency_90d, 0) + COALESCE(ca.frequency_90d, 0) AS rfm_frequency,
          COALESCE(aa.monetary_90d, 0) + COALESCE(ca.monetary_90d, 0) AS rfm_monetary,
          CASE WHEN COALESCE(aa.frequency_90d, 0) + COALESCE(ca.frequency_90d, 0) > 0
               THEN 1 ELSE 0 END AS has_rfm_activity
      FROM customers c
      LEFT JOIN account_agg a ON c.customer_id = a.customer_id
      LEFT JOIN deposit_agg d ON c.customer_id = d.customer_id
      LEFT JOIN loan_agg l ON c.customer_id = l.customer_id
      LEFT JOIN card_agg cd ON c.customer_id = cd.customer_id
      LEFT JOIN account_txn_30d at ON c.customer_id = at.customer_id
      LEFT JOIN card_txn_30d ct ON c.customer_id = ct.customer_id
      LEFT JOIN primary_channel pc ON c.customer_id = pc.customer_id
      LEFT JOIN crm_agg crm ON c.customer_id = crm.customer_id
      LEFT JOIN account_activity aa ON c.customer_id = aa.customer_id
      LEFT JOIN card_activity ca ON c.customer_id = ca.customer_id
  ),
  active_ranked AS (
      SELECT
          customer_id,
          NTILE(5) OVER (
              ORDER BY DATEDIFF(DATE '{{ cob_dt }}', CAST(last_txn_date AS DATE)) DESC, customer_id
          ) AS r_score,
          NTILE(5) OVER (ORDER BY rfm_frequency ASC, customer_id) AS f_score,
          NTILE(5) OVER (ORDER BY rfm_monetary ASC, customer_id) AS m_score
      FROM combined
      WHERE has_rfm_activity = 1
  ),
  scored AS (
      SELECT
          b.*,
          COALESCE(r.r_score, 1) AS r_score,
          COALESCE(r.f_score, 1) AS f_score,
          COALESCE(r.m_score, 1) AS m_score
      FROM combined b
      LEFT JOIN active_ranked r ON b.customer_id = r.customer_id
  )
  SELECT
      customer_id,
      customer_sk,
      CONCAT(SPLIT(full_name, ' ')[0], ' **') AS full_name_masked,
      CAST(DATEDIFF(DATE '{{ cob_dt }}', date_of_birth) / 365 AS INT) AS age,
      gender,
      primary_branch_code,
      customer_segment,
      kyc_status,
      register_date,
      CAST(total_accounts AS INT) AS total_accounts,
      CAST(total_cards AS INT) AS total_cards,
      CAST(total_loans AS INT) AS total_loans,
      has_credit_card,
      has_savings,
      has_loan,
      CAST(ROUND(total_deposit_balance, 2) AS DECIMAL(18,2)) AS total_deposit_balance,
      CAST(ROUND(total_loan_outstanding, 2) AS DECIMAL(18,2)) AS total_loan_outstanding,
      CAST(ROUND(total_deposit_balance, 2) AS DECIMAL(18,2)) AS aum_total,
      CASE
          WHEN total_deposit_balance >= 5000000000 THEN 'VIP'
          WHEN total_deposit_balance >= 1000000000 THEN 'PRIORITY'
          WHEN total_deposit_balance >= 100000000 THEN 'AFFLUENT'
          ELSE 'MASS'
      END AS aum_bucket,
      txn_count_30d,
      CAST(ROUND(txn_amount_30d, 2) AS DECIMAL(18,2)) AS txn_amount_30d,
      CASE WHEN last_txn_date = TIMESTAMP '1900-01-01 00:00:00'
           THEN CAST(NULL AS TIMESTAMP) ELSE last_txn_date END AS last_txn_date,
      CASE WHEN last_txn_date = TIMESTAMP '1900-01-01 00:00:00'
           THEN 99999 ELSE DATEDIFF(DATE '{{ cob_dt }}', CAST(last_txn_date AS DATE)) END
          AS days_since_last_txn,
      primary_channel,
      interaction_count_90d,
      last_interaction_date,
      r_score AS rfm_recency_score,
      f_score AS rfm_frequency_score,
      m_score AS rfm_monetary_score,
      CASE
          WHEN has_rfm_activity = 0 THEN 'Lost'
          WHEN r_score <= 2 AND (f_score >= 3 OR m_score >= 3) THEN 'At Risk'
          WHEN (r_score + f_score + m_score) >= 13 THEN 'Champions'
          WHEN (r_score + f_score + m_score) >= 10 THEN 'Loyal Customers'
          WHEN r_score >= 4 AND f_score <= 2 THEN 'New Customers'
          WHEN (r_score + f_score + m_score) >= 8 THEN 'Potential Loyalists'
          WHEN r_score = 1 AND f_score = 1 AND m_score = 1 THEN 'Lost'
          WHEN (r_score + f_score + m_score) <= 7 THEN 'Hibernating'
          ELSE 'Lost'
      END AS rfm_segment,
      CASE
          WHEN last_txn_date = TIMESTAMP '1900-01-01 00:00:00'
            OR DATEDIFF(DATE '{{ cob_dt }}', CAST(last_txn_date AS DATE)) > 90
          THEN 1 ELSE 0
      END AS churn_flag,
      CASE WHEN total_deposit_balance >= 100000000 AND has_credit_card = 0
           THEN 1 ELSE 0 END AS cross_sell_credit_card_flag,
      DATE '{{ cob_dt }}' AS cob_dt
  FROM scored
