job:
  type: mart360

source:
  tables:
    - silver.dim_customer
    - silver.dim_card
    - silver.fact_card_txn

target:
  catalog: lakehouse
  schema: gold
  table: customer_card_summary

upstream_flags:
  - silver.dim_customer
  - silver.dim_card
  - silver.fact_card_txn

sql: |
  SELECT
      c.customer_id,
      c.customer_sk,
      -- Thống kê thẻ (join bởi customer_id)
      COUNT(DISTINCT cd.card_id)                                                         AS total_cards,
      COUNT(DISTINCT CASE WHEN cd.card_type = 'CREDIT'
                          AND cd.status = 'ACTIVE'  THEN cd.card_id END)                AS cnt_credit_active,
      COUNT(DISTINCT CASE WHEN cd.card_type = 'DEBIT'
                          AND cd.status = 'ACTIVE'  THEN cd.card_id END)                AS cnt_debit_active,
      MAX(CASE WHEN cd.card_type = 'CREDIT' THEN cd.credit_limit END)                  AS max_credit_limit,
      -- Giao dịch thẻ 30 ngày
      COUNT(DISTINCT t.txn_id)                                                          AS total_card_txn_count_30d,
      COALESCE(SUM(CASE WHEN t.txn_type NOT IN ('REFUND','REVERSAL')
                        THEN t.txn_amount ELSE 0 END), 0)                              AS total_card_txn_amount_30d,
      COALESCE(AVG(CASE WHEN t.txn_type NOT IN ('REFUND','REVERSAL')
                        THEN t.txn_amount END), 0)                                     AS avg_card_txn_amount_30d,
      COUNT(DISTINCT t.merchant_category)                                               AS distinct_merchant_categories,
      MAX(t.txn_date)                                                                   AS last_card_txn_date,
      DATE '{{ cob_dt }}'                                                                       AS cob_dt
  FROM lakehouse.silver.dim_customer c
  LEFT JOIN lakehouse.silver.dim_card cd
      ON c.customer_id = cd.customer_id
  LEFT JOIN lakehouse.silver.fact_card_txn t
      ON c.customer_id = t.customer_id
      AND t.txn_date >= DATE_ADD(DATE '{{ cob_dt }}', -30)
      AND t.txn_date <= DATE '{{ cob_dt }}'
      AND t.status = 'SUCCESS'
  WHERE c.is_current = 1
  GROUP BY
      c.customer_id,
      c.customer_sk
