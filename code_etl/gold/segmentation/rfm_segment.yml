job:
  type: segment

source:
  tables:
    - silver.dim_customer
    - silver.fact_txn_account
    - silver.fact_card_txn

target:
  catalog: lakehouse
  schema: gold
  table: rfm_segment

write:
  strategy: overwrite_partitions

upstream_flags:
  - silver.dim_customer
  - silver.fact_txn_account
  - silver.fact_card_txn

sql: |
  WITH customers AS (
      SELECT customer_id, customer_sk
      FROM lakehouse.silver.dim_customer
      WHERE DATE '{{ cob_dt }}' BETWEEN effective_from AND effective_to
  ),
  account_rfm AS (
      SELECT
          customer_id,
          MAX(txn_date) AS last_txn_date,
          COUNT(txn_id) AS frequency,
          SUM(ABS(txn_amount)) AS monetary
      FROM lakehouse.silver.fact_txn_account
      WHERE CAST(txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -90)
        AND CAST(txn_date AS DATE) <= DATE '{{ cob_dt }}'
      GROUP BY customer_id
  ),
  card_rfm AS (
      SELECT
          customer_id,
          MAX(txn_date) AS last_txn_date,
          COUNT(txn_id) AS frequency,
          SUM(txn_amount) AS monetary
      FROM lakehouse.silver.fact_card_txn
      WHERE CAST(txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -90)
        AND CAST(txn_date AS DATE) <= DATE '{{ cob_dt }}'
        AND status = 'SUCCESS'
        AND txn_type NOT IN ('REFUND', 'REVERSAL')
      GROUP BY customer_id
  ),
  rfm_base AS (
      SELECT
          c.customer_id,
          c.customer_sk,
          CASE
              WHEN COALESCE(a.frequency, 0) + COALESCE(cd.frequency, 0) = 0 THEN 99999
              ELSE DATEDIFF(
                  DATE '{{ cob_dt }}',
                  CAST(GREATEST(
                      COALESCE(a.last_txn_date, TIMESTAMP '1900-01-01 00:00:00'),
                      COALESCE(cd.last_txn_date, TIMESTAMP '1900-01-01 00:00:00')
                  ) AS DATE)
              )
          END AS recency_days,
          COALESCE(a.frequency, 0) + COALESCE(cd.frequency, 0) AS frequency,
          COALESCE(a.monetary, 0) + COALESCE(cd.monetary, 0) AS monetary,
          CASE WHEN COALESCE(a.frequency, 0) + COALESCE(cd.frequency, 0) > 0 THEN 1 ELSE 0 END
              AS has_activity
      FROM customers c
      LEFT JOIN account_rfm a ON c.customer_id = a.customer_id
      LEFT JOIN card_rfm cd ON c.customer_id = cd.customer_id
  ),
  active_ranked AS (
      SELECT
          customer_id,
          NTILE(5) OVER (ORDER BY recency_days DESC, customer_id) AS r_score,
          NTILE(5) OVER (ORDER BY frequency ASC, customer_id) AS f_score,
          NTILE(5) OVER (ORDER BY monetary ASC, customer_id) AS m_score
      FROM rfm_base
      WHERE has_activity = 1
  ),
  scored AS (
      SELECT
          b.*,
          COALESCE(r.r_score, 1) AS r_score,
          COALESCE(r.f_score, 1) AS f_score,
          COALESCE(r.m_score, 1) AS m_score
      FROM rfm_base b
      LEFT JOIN active_ranked r ON b.customer_id = r.customer_id
  )
  SELECT
      customer_id,
      customer_sk,
      recency_days,
      frequency,
      CAST(ROUND(monetary, 2) AS DECIMAL(18,2)) AS monetary,
      r_score,
      f_score,
      m_score,
      (r_score + f_score + m_score) AS rfm_score,
      CASE
          WHEN has_activity = 0 THEN 'Lost'
          WHEN r_score <= 2 AND (f_score >= 3 OR m_score >= 3) THEN 'At Risk'
          WHEN (r_score + f_score + m_score) >= 13 THEN 'Champions'
          WHEN (r_score + f_score + m_score) >= 10 THEN 'Loyal Customers'
          WHEN r_score >= 4 AND f_score <= 2 THEN 'New Customers'
          WHEN (r_score + f_score + m_score) >= 8 THEN 'Potential Loyalists'
          WHEN r_score = 1 AND f_score = 1 AND m_score = 1 THEN 'Lost'
          WHEN (r_score + f_score + m_score) <= 7 THEN 'Hibernating'
          ELSE 'Lost'
      END AS rfm_segment,
      DATE '{{ cob_dt }}' AS cob_dt
  FROM scored
