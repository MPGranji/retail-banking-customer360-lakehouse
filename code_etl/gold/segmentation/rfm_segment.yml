job:
  type: segment

source:
  tables:
    - silver.dim_customer
    - silver.fact_txn_account
    - silver.fact_card_txn

target:
  catalog: lakehouse
  schema: gold
  table: rfm_segment

upstream_flags:
  - silver.dim_customer
  - silver.fact_txn_account
  - silver.fact_card_txn

sql: |
  WITH rfm_base AS (
      -- Gộp cả giao dịch tài khoản và thẻ trong 90 ngày
      SELECT
          c.customer_id,
          c.customer_sk,
          DATEDIFF(DATE '{{ cob_dt }}',
              CAST(GREATEST(
                  COALESCE(MAX(t.txn_date), TIMESTAMP '1900-01-01 00:00:00'),
                  COALESCE(MAX(ct.txn_date), TIMESTAMP '1900-01-01 00:00:00')
              ) AS DATE)
          )                                                       AS recency_days,
          COUNT(DISTINCT t.txn_id) + COUNT(DISTINCT ct.txn_id)   AS frequency,
          COALESCE(SUM(ABS(t.txn_amount)), 0)
              + COALESCE(SUM(CASE WHEN ct.txn_type NOT IN ('REFUND','REVERSAL')
                                  THEN ct.txn_amount ELSE 0 END), 0)
                                                                  AS monetary
      FROM lakehouse.silver.dim_customer c
      LEFT JOIN lakehouse.silver.fact_txn_account t
          ON c.customer_id = t.customer_id
          AND CAST(t.txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -90)
          AND CAST(t.txn_date AS DATE) <= DATE '{{ cob_dt }}'
      LEFT JOIN lakehouse.silver.fact_card_txn ct
          ON c.customer_id = ct.customer_id
          AND CAST(ct.txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -90)
          AND CAST(ct.txn_date AS DATE) <= DATE '{{ cob_dt }}'
          AND ct.status = 'SUCCESS'
      WHERE c.is_current = 1
      GROUP BY c.customer_id, c.customer_sk
  ),
  rfm_scored AS (
      SELECT
          customer_id,
          customer_sk,
          recency_days,
          frequency,
          monetary,
          -- R: recency thấp = score cao (mua gần đây = tốt)
          NTILE(5) OVER (ORDER BY recency_days ASC)  AS r_score,
          NTILE(5) OVER (ORDER BY frequency DESC)    AS f_score,
          NTILE(5) OVER (ORDER BY monetary DESC)     AS m_score
      FROM rfm_base
  )
  SELECT
      customer_id,
      customer_sk,
      recency_days,
      frequency,
      ROUND(monetary, 2)             AS monetary,
      r_score,
      f_score,
      m_score,
      (r_score + f_score + m_score)  AS rfm_score,
      -- 7-segment RFM chuẩn theo CLAUDE.md
      CASE
          WHEN (r_score + f_score + m_score) >= 13 THEN 'Champions'
          WHEN (r_score + f_score + m_score) >= 10 THEN 'Loyal Customers'
          WHEN (r_score + f_score + m_score) >= 7  THEN 'Potential Loyalists'
          WHEN (r_score + f_score + m_score) >= 6  THEN 'New Customers'
          WHEN (r_score + f_score + m_score) >= 4  THEN 'At Risk'
          WHEN (r_score + f_score + m_score) >= 2  THEN 'Hibernating'
          ELSE 'Lost'
      END                            AS rfm_segment,
      DATE '{{ cob_dt }}'                   AS cob_dt
  FROM rfm_scored
