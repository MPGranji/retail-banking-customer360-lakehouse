job:
  type: segment

source:
  tables:
    - silver.dim_customer
    - silver.fact_txn_account
    - silver.fact_card_txn

target:
  catalog: lakehouse
  schema: gold
  table: churn_prediction

upstream_flags:
  - silver.dim_customer
  - silver.fact_txn_account
  - silver.fact_card_txn

sql: |
  WITH activity AS (
      SELECT
          c.customer_id,
          c.customer_sk,
          -- Account transactions
          COUNT(DISTINCT CASE WHEN CAST(t.txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -30)
                              THEN t.txn_id END)                                   AS acct_cnt_30d,
          COUNT(DISTINCT CASE WHEN CAST(t.txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -90)
                              THEN t.txn_id END)                                   AS acct_cnt_90d,
          -- Card transactions (chỉ SUCCESS)
          COUNT(DISTINCT CASE WHEN CAST(ct.txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -30)
                              THEN ct.txn_id END)                                  AS card_cnt_30d,
          COUNT(DISTINCT CASE WHEN CAST(ct.txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -90)
                              THEN ct.txn_id END)                                  AS card_cnt_90d,
          -- Combined amounts
          COALESCE(SUM(CASE WHEN CAST(t.txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -30)
                            THEN ABS(t.txn_amount) END), 0)                       AS acct_amt_30d,
          COALESCE(SUM(CASE WHEN CAST(t.txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -90)
                            THEN ABS(t.txn_amount) END), 0)                       AS acct_amt_90d,
          -- Last txn date combined
          GREATEST(
              COALESCE(MAX(t.txn_date), TIMESTAMP '1900-01-01 00:00:00'),
              COALESCE(MAX(ct.txn_date), TIMESTAMP '1900-01-01 00:00:00')
          )                                                                        AS last_txn_ts
      FROM lakehouse.silver.dim_customer c
      LEFT JOIN lakehouse.silver.fact_txn_account t
          ON c.customer_id = t.customer_id
          AND CAST(t.txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -365)
          AND CAST(t.txn_date AS DATE) <= DATE '{{ cob_dt }}'
      LEFT JOIN lakehouse.silver.fact_card_txn ct
          ON c.customer_id = ct.customer_id
          AND CAST(ct.txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -365)
          AND CAST(ct.txn_date AS DATE) <= DATE '{{ cob_dt }}'
          AND ct.status = 'SUCCESS'
      WHERE c.is_current = 1
      GROUP BY c.customer_id, c.customer_sk
  )
  SELECT
      customer_id,
      customer_sk,
      acct_cnt_30d  + card_cnt_30d   AS txn_cnt_30d,
      acct_cnt_90d  + card_cnt_90d   AS txn_cnt_90d,
      acct_amt_30d                   AS txn_amt_30d,
      acct_amt_90d                   AS txn_amt_90d,
      DATEDIFF(DATE '{{ cob_dt }}', CAST(last_txn_ts AS DATE))
                                     AS days_since_last_txn,
      CASE
          WHEN last_txn_ts = TIMESTAMP '1900-01-01 00:00:00'
           OR DATEDIFF(DATE '{{ cob_dt }}', CAST(last_txn_ts AS DATE)) > 90 THEN 'High'
          WHEN DATEDIFF(DATE '{{ cob_dt }}', CAST(last_txn_ts AS DATE)) > 60 THEN 'Medium'
          WHEN DATEDIFF(DATE '{{ cob_dt }}', CAST(last_txn_ts AS DATE)) > 30 THEN 'Low'
          ELSE 'Active'
      END                            AS churn_risk,
      CASE
          WHEN last_txn_ts = TIMESTAMP '1900-01-01 00:00:00'
           OR DATEDIFF(DATE '{{ cob_dt }}', CAST(last_txn_ts AS DATE)) > 90 THEN 1
          ELSE 0
      END                            AS is_churn_candidate,
      DATE '{{ cob_dt }}'                   AS cob_dt
  FROM activity
