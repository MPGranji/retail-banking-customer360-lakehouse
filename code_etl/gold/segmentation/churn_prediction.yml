job:
  type: segment

source:
  tables:
    - silver.dim_customer
    - silver.fact_txn_account
    - silver.fact_card_txn

target:
  catalog: lakehouse
  schema: gold
  table: churn_prediction

write:
  strategy: overwrite_partitions

upstream_flags:
  - silver.dim_customer
  - silver.fact_txn_account
  - silver.fact_card_txn

sql: |
  WITH customers AS (
      SELECT customer_id, customer_sk
      FROM lakehouse.silver.dim_customer
      WHERE DATE '{{ cob_dt }}' BETWEEN effective_from AND effective_to
  ),
  account_activity AS (
      SELECT
          customer_id,
          COUNT(CASE WHEN CAST(txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -30) THEN txn_id END)
              AS txn_cnt_30d,
          COUNT(CASE WHEN CAST(txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -90) THEN txn_id END)
              AS txn_cnt_90d,
          SUM(CASE WHEN CAST(txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -30)
                   THEN ABS(txn_amount) ELSE 0 END) AS txn_amt_30d,
          SUM(CASE WHEN CAST(txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -90)
                   THEN ABS(txn_amount) ELSE 0 END) AS txn_amt_90d,
          MAX(txn_date) AS last_txn_ts
      FROM lakehouse.silver.fact_txn_account
      WHERE CAST(txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -365)
        AND CAST(txn_date AS DATE) <= DATE '{{ cob_dt }}'
      GROUP BY customer_id
  ),
  card_activity AS (
      SELECT
          customer_id,
          COUNT(CASE WHEN CAST(txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -30) THEN txn_id END)
              AS txn_cnt_30d,
          COUNT(CASE WHEN CAST(txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -90) THEN txn_id END)
              AS txn_cnt_90d,
          SUM(CASE WHEN CAST(txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -30)
                   THEN txn_amount ELSE 0 END) AS txn_amt_30d,
          SUM(CASE WHEN CAST(txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -90)
                   THEN txn_amount ELSE 0 END) AS txn_amt_90d,
          MAX(txn_date) AS last_txn_ts
      FROM lakehouse.silver.fact_card_txn
      WHERE CAST(txn_date AS DATE) >= DATE_ADD(DATE '{{ cob_dt }}', -365)
        AND CAST(txn_date AS DATE) <= DATE '{{ cob_dt }}'
        AND status = 'SUCCESS'
        AND txn_type NOT IN ('REFUND', 'REVERSAL')
      GROUP BY customer_id
  ),
  activity AS (
      SELECT
          c.customer_id,
          c.customer_sk,
          COALESCE(a.txn_cnt_30d, 0) + COALESCE(cd.txn_cnt_30d, 0) AS txn_cnt_30d,
          COALESCE(a.txn_cnt_90d, 0) + COALESCE(cd.txn_cnt_90d, 0) AS txn_cnt_90d,
          COALESCE(a.txn_amt_30d, 0) + COALESCE(cd.txn_amt_30d, 0) AS txn_amt_30d,
          COALESCE(a.txn_amt_90d, 0) + COALESCE(cd.txn_amt_90d, 0) AS txn_amt_90d,
          GREATEST(
              COALESCE(a.last_txn_ts, TIMESTAMP '1900-01-01 00:00:00'),
              COALESCE(cd.last_txn_ts, TIMESTAMP '1900-01-01 00:00:00')
          ) AS last_txn_ts
      FROM customers c
      LEFT JOIN account_activity a ON c.customer_id = a.customer_id
      LEFT JOIN card_activity cd ON c.customer_id = cd.customer_id
  )
  SELECT
      customer_id,
      customer_sk,
      txn_cnt_30d,
      txn_cnt_90d,
      CAST(ROUND(txn_amt_30d, 2) AS DECIMAL(18,2)) AS txn_amt_30d,
      CAST(ROUND(txn_amt_90d, 2) AS DECIMAL(18,2)) AS txn_amt_90d,
      DATEDIFF(DATE '{{ cob_dt }}', CAST(last_txn_ts AS DATE)) AS days_since_last_txn,
      CASE
          WHEN last_txn_ts = TIMESTAMP '1900-01-01 00:00:00'
           OR DATEDIFF(DATE '{{ cob_dt }}', CAST(last_txn_ts AS DATE)) > 90 THEN 'High'
          WHEN DATEDIFF(DATE '{{ cob_dt }}', CAST(last_txn_ts AS DATE)) > 60 THEN 'Medium'
          WHEN DATEDIFF(DATE '{{ cob_dt }}', CAST(last_txn_ts AS DATE)) > 30 THEN 'Low'
          ELSE 'Active'
      END AS churn_risk,
      CASE
          WHEN last_txn_ts = TIMESTAMP '1900-01-01 00:00:00'
           OR DATEDIFF(DATE '{{ cob_dt }}', CAST(last_txn_ts AS DATE)) > 90 THEN 1
          ELSE 0
      END AS is_churn_candidate,
      DATE '{{ cob_dt }}' AS cob_dt
  FROM activity
