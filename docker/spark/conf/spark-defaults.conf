# =============================================================================
# Spark Defaults — áp dụng cho mọi spark-submit trong cluster này
# File được mount vào /opt/spark/conf/ trong tất cả Spark containers
# =============================================================================

# --- Event Logging -----------------------------------------------------------
# Tắt event logging — không dùng History Server, tránh tốn disk và I/O
spark.eventLog.enabled                          false

# --- Iceberg Extensions ------------------------------------------------------
spark.sql.extensions                            org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.lakehouse                     org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.lakehouse.type                rest
spark.sql.catalog.lakehouse.uri                 http://iceberg-rest:8181
spark.sql.catalog.lakehouse.warehouse           s3a://lakehouse/lakehouse
spark.sql.catalog.lakehouse.io-impl             org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.lakehouse.s3.endpoint            http://minio:9000
spark.sql.catalog.lakehouse.s3.path-style-access  true
spark.sql.catalog.lakehouse.s3.access-key-id      ${MINIO_ROOT_USER}
spark.sql.catalog.lakehouse.s3.secret-access-key  ${MINIO_ROOT_PASSWORD}
spark.sql.defaultCatalog                        lakehouse

# --- S3A / MinIO -------------------------------------------------------------
spark.hadoop.fs.s3a.path.style.access          true
spark.hadoop.fs.s3a.impl                        org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.aws.credentials.provider   org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider

# --- Timezone ----------------------------------------------------------------
spark.sql.session.timeZone                      Asia/Ho_Chi_Minh

# --- Resource per application (1 app tại 1 thời điểm) -----------------------
# Worker: 4 cores, 1200m advertised, container cap 1600m
# spark.cores.max=1 = executor.cores=1 → 1 core/app, không tranh chấp với Jupyter
# 1 executor: 1 core × 768m heap + 192m overhead = 960m → fit trong 1200m ✓
# driver chạy trong airflow-scheduler (1300m cap): 512m + 192m overhead = 704m
# File này được mount vào /opt/spark/conf/ — NGUỒN DUY NHẤT của Spark resource config.
spark.cores.max                                 1
spark.executor.cores                            1
spark.executor.instances                        1
spark.executor.memory                           768m
spark.driver.memory                             512m
spark.driver.memoryOverhead                     192m
spark.executor.memoryOverhead                   192m

# --- Serializer & shuffle ----------------------------------------------------
# Dùng JavaSerializer thay vì KryoSerializer để tránh lỗi Kryo 5.x với Iceberg.
spark.serializer                                org.apache.spark.serializer.JavaSerializer
spark.sql.shuffle.partitions                    4
