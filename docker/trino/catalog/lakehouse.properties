# Trino Lakehouse Catalog — kết nối tới Iceberg REST Catalog (tabulario)
# Tên catalog "lakehouse" đồng bộ với Spark catalog (spark.sql.catalog.lakehouse)
connector.name=iceberg
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://iceberg-rest:8181
iceberg.rest-catalog.warehouse=s3a://lakehouse/lakehouse
iceberg.file-format=PARQUET

# Native S3 filesystem (Trino 400+: dùng fs.s3.* thay cho hive.s3.*)
fs.s3.enabled=true
s3.endpoint=http://minio:9000
s3.path-style-access=true
s3.aws-access-key=${ENV:MINIO_ROOT_USER}
s3.aws-secret-key=${ENV:MINIO_ROOT_PASSWORD}
s3.region=us-east-1
