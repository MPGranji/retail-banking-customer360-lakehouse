# =============================================================================
# Customer 360 Lakehouse — Docker Compose Stack
# =============================================================================
#
# KIẾN TRÚC DEPENDENCY:
#
#   oracle ──────────────────────────────────────────────────────────────────┐
#   postgres ──────────────────────────────┬─────────────────────────────── │
#       │                                  │                                 │
#   minio → mc → iceberg-rest             │                                 │
#                    │                    │                                  │
#               spark-master ─────────────┼──────── airflow-init            │
#                    │                    │              │                   │
#              spark-worker-1             │   airflow-webserver (1 worker)  │
#                                         │   airflow-scheduler              │
#                                         │                                  │
#   trino ──────────────────────────────┘                                   │
#   (trino đọc trực tiếp từ iceberg-rest)                                   │
#   (oracle/postgres cung cấp data nguồn qua JDBC)─────────────────────────┘
#
# =============================================================================
# QUICK START — chỉ khởi động service cần thiết:
#
#   [1] Storage layer (nguồn dữ liệu + object storage):
#       make up  hoặc  docker compose up -d
#
#   [2] Spark cluster riêng lẻ:
#       docker compose up -d oracle postgres minio mc iceberg-rest \
#           spark-master spark-worker-1
#
#   [3] Full stack bao gồm Trino + Jupyter (mặc định — khuyến nghị):
#       make up  hoặc  docker compose up -d
#       Trino + Spark + Jupyter bật cùng lúc theo thiết kế.
#
# RESOURCE BUDGET (Docker Desktop 10GB — Spark + Trino chạy song song):
#
#   oracle          2200m  │ XE min 2GB, 200m headroom
#   postgres         400m  │ dev scale
#   minio            384m  │ object storage nhẹ
#   iceberg-rest     384m  │ REST adapter nhẹ
#   spark-master     400m  │ coordinate only
#   spark-worker-1  1600m  │ 1 executor: 768m + 256m overhead + JVM 576m
#   trino           1200m  │ heap 768m + code-cache 128m + JVM overhead ~304m
#   airflow-web      800m  │ web UI (1 Gunicorn worker)
#   airflow-sched   1300m  │ driver 512m + 192m overhead + scheduler base 400m + buffer 196m
#   ─────────────────────────────────────────────────────────────────────────
#   TOTAL           8668m  │ headroom ~1.3GB cho kernel + file cache OS
#
# Network: lakehouse_net (tất cả service join cùng 1 network bridge)
#
# LƯU Ý: Trino chạy song song với Spark theo thiết kế.
#         Flow chuẩn: Airflow trigger Spark ingest → dữ liệu vào Iceberg → Trino query ngay.
# =============================================================================

# =============================================================================
# ORCHESTRATION — Airflow (shared config anchor)
# Khai báo ở đây vì YAML yêu cầu anchor phải định nghĩa trước khi dùng.
# Ba service thực tế (airflow-init, airflow-webserver, airflow-scheduler)
# nằm ở cuối file, dùng anchor này qua "<<: *airflow-common".
# Mọi thay đổi env / volumes cho Airflow → sửa tại đây, áp dụng cho cả 3.
# =============================================================================
x-airflow-common: &airflow-common
  build:
    context: ./airflow
    dockerfile: Dockerfile
  image: lakehouse-airflow:2.10.0
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${AIRFLOW_DB}
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    AIRFLOW__CORE__DEFAULT_TIMEZONE: "Asia/Ho_Chi_Minh"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/project/airflow/dags
    AIRFLOW__CORE__PLUGINS_FOLDER: /opt/project/airflow/plugins
    TZ: "Asia/Ho_Chi_Minh"
    AIRFLOW__LOGGING__REMOTE_LOGGING: "true"
    AIRFLOW__LOGGING__REMOTE_BASE_LOG_FOLDER: "s3://${MINIO_BUCKET}/airflow-logs"
    AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID: "aws_s3_minio"
    AIRFLOW__LOGGING__DELETE_LOCAL_LOGS: "true"
    AIRFLOW__CORE__LOG_RETENTION_DAYS: "3"
    AIRFLOW__WEBSERVER__WORKERS: "1"
    AIRFLOW_CONN_AWS_S3_MINIO: >-
      {"conn_type": "aws", "extra": {"endpoint_url": "http://minio:9000", "region_name": "us-east-1"}}
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
    MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
    AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    AWS_REGION: us-east-1
  volumes:
    - ..:/opt/project
    - airflow-logs:/opt/airflow/logs
    - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
  networks:
    - lakehouse_net
  depends_on:
    postgres:
      condition: service_healthy

# =============================================================================
services:

  # ===========================================================================
  # SOURCE DATABASES
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Oracle XE 21c — Core Banking source
  # Port:    1521 (JDBC)
  # Schema:  CORE_BANKING (7 bảng: branch, product, customer, account,
  #                         deposit, loan, txn_account)
  # ---------------------------------------------------------------------------
  oracle:
    image: gvenzl/oracle-xe:21-slim
    # Oracle XE chỉ có image linux/amd64. Trên Apple Silicon (M1/M2/M3) Docker Desktop
    # dùng Rosetta emulation — chậm hơn native nhưng hoạt động đúng.
    platform: linux/amd64
    container_name: oracle
    hostname: oracle
    env_file: .env
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}
      APP_USER: ${ORACLE_USER}
      APP_USER_PASSWORD: ${ORACLE_PASSWORD}
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./init_oracle:/container-entrypoint-initdb.d
    mem_limit: 2200m
    shm_size: '1g'
    healthcheck:
      test: ["CMD-SHELL", "echo 'SELECT 1 FROM DUAL;' | sqlplus -S ${ORACLE_USER}/${ORACLE_PASSWORD}@//localhost:1521/${ORACLE_SERVICE}"]
      interval: 60s
      timeout: 30s
      retries: 10
      start_period: 120s
    networks:
      - lakehouse_net

  # ---------------------------------------------------------------------------
  # PostgreSQL 15 — Card/CRM source + Airflow backend + ETL ops metadata
  # Port:    5432
  # Schemas: card_crm, public (airflow), opslakehouse, iceberg_catalog
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    hostname: postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGTZ: "Asia/Ho_Chi_Minh"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init_postgres:/docker-entrypoint-initdb.d
    mem_limit: 400m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lakehouse_net

  # ===========================================================================
  # OBJECT STORAGE LAYER
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage
  # Port:    9000 (S3 API) | 9001 (Web console)
  # UI:      http://localhost:9001
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    hostname: minio
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    mem_limit: 384m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lakehouse_net

  # ---------------------------------------------------------------------------
  # MinIO Client (mc) — Init container: tạo bucket + lifecycle rule, rồi exit
  # ---------------------------------------------------------------------------
  mc:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: mc-init
    env_file: .env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set myminio http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
        mc mb --ignore-existing myminio/${MINIO_BUCKET};
        mc mb --ignore-existing myminio/${MINIO_BUCKET}/lakehouse;
        echo 'placeholder' | mc pipe myminio/${MINIO_BUCKET}/lakehouse/.keep;
        mc mb --ignore-existing myminio/${MINIO_BUCKET}/airflow-logs;
        echo 'placeholder' | mc pipe myminio/${MINIO_BUCKET}/airflow-logs/.keep;
        mc ilm rule add --expire-days 30 --prefix airflow-logs/ myminio/${MINIO_BUCKET} || true;
        echo 'MinIO bucket initialized.';
        exit 0;
      "
    networks:
      - lakehouse_net

  # ===========================================================================
  # CATALOG LAYER
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Iceberg REST Catalog
  # Port:    8181
  # Backend: MinIO (data files) + PostgreSQL (catalog metadata — persistent)
  # ---------------------------------------------------------------------------
  iceberg-rest:
    image: tabulario/iceberg-rest:1.6.0
    container_name: iceberg-rest
    hostname: iceberg-rest
    env_file: .env
    environment:
      CATALOG_WAREHOUSE: s3a://${MINIO_BUCKET}/lakehouse
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: us-east-1
      CATALOG_CATALOG__IMPL: org.apache.iceberg.jdbc.JdbcCatalog
      CATALOG_URI: jdbc:postgresql://postgres:5432/${ICEBERG_DB:-iceberg_catalog}
      CATALOG_JDBC_USER: ${POSTGRES_USER}
      CATALOG_JDBC_PASSWORD: ${POSTGRES_PASSWORD}
      CATALOG_JDBC_INITIALIZE__TABLES: "true"
    ports:
      - "8181:8181"
    mem_limit: 384m
    depends_on:
      minio:
        condition: service_healthy
      mc:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      # tabulario/iceberg-rest không có curl/wget — dùng bash /dev/tcp built-in
      test: ["CMD", "/bin/bash", "-c", "exec 3<>/dev/tcp/localhost/8181 && echo -e 'GET /v1/config HTTP/1.0\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 20s
    networks:
      - lakehouse_net

  # ===========================================================================
  # SPARK CLUSTER (Standalone Mode)
  #
  # 1 Master + 1 Worker
  # Worker: 4 cores, 1200m (SPARK_WORKER_MEMORY) — advertise cho master
  # Container cap: 1600m = executor (960m) + worker daemon (~300m) + buffer
  # Mỗi app: 1 executor × 1 core × 768m — spark.cores.max=1 giới hạn mỗi app
  # Jupyter và Airflow jobs KHÔNG chạy đồng thời (1 executor/lúc)
  # Resource config tập trung tại: docker/spark/conf/spark-defaults.conf
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Spark Master — cluster coordinator
  # Port:    9090 (Web UI) | 7077 (cluster)
  # UI:      http://localhost:9090
  # ---------------------------------------------------------------------------
  spark-master:
    build:
      context: ./spark
      dockerfile: Dockerfile
    image: lakehouse-spark:3.5.0
    container_name: spark-master
    hostname: spark-master
    env_file: .env
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      ICEBERG_CATALOG_URI: http://iceberg-rest:8181
      ICEBERG_WAREHOUSE: s3a://${MINIO_BUCKET}/lakehouse
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: us-east-1
      TZ: "Asia/Ho_Chi_Minh"
    ports:
      - "9090:9090"
      - "7077:7077"
    volumes:
      - ..:/opt/project
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    mem_limit: 400m
    depends_on:
      iceberg-rest:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9090/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - lakehouse_net

  # ---------------------------------------------------------------------------
  # Spark Worker 1 — executor node (4 cores, 1200m advertised)
  # Container cap 1600m: 1 executor tại 1 thời điểm (Jupyter HOẶC Airflow job).
  # Port:    9091 → 8081 (Worker Web UI)
  # ---------------------------------------------------------------------------
  spark-worker-1:
    build:
      context: ./spark
      dockerfile: Dockerfile
    image: lakehouse-spark:3.5.0
    container_name: spark-worker-1
    hostname: spark-worker-1
    env_file: .env
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY:-2g}
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES:-4}
      ICEBERG_CATALOG_URI: http://iceberg-rest:8181
      ICEBERG_WAREHOUSE: s3a://${MINIO_BUCKET}/lakehouse
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: us-east-1
      TZ: "Asia/Ho_Chi_Minh"
    ports:
      - "9091:8081"
    volumes:
      - ..:/opt/project
      - spark-work-1:/opt/spark/work
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
    # executor: 768m heap + 192m overhead + worker JVM ~300m = ~1260m; cap 1600m
    mem_limit: 1600m
    depends_on:
      spark-master:
        condition: service_healthy
    networks:
      - lakehouse_net

  # ===========================================================================
  # INTERACTIVE ANALYSIS
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # JupyterLab — interactive notebooks với PySpark + Iceberg
  # Port:    8888
  # Bật mặc định cùng docker compose up -d
  #
  # KHÔNG chạy đồng thời với Airflow Spark jobs — 1 app tại 1 thời điểm.
  # UI:      http://localhost:8888
  # ---------------------------------------------------------------------------
  jupyter:
    build:
      context: ./jupyter
      dockerfile: Dockerfile
    image: lakehouse-jupyter:3.5.0-jlab4.3.8
    container_name: jupyter
    hostname: jupyter
    env_file: .env
    environment:
      SPARK_MASTER_URL: spark://spark-master:7077
      ICEBERG_CATALOG_URI: http://iceberg-rest:8181
      ICEBERG_WAREHOUSE: s3a://${MINIO_BUCKET}/lakehouse
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: us-east-1
      PYSPARK_PYTHON: python3
      TZ: "Asia/Ho_Chi_Minh"
    ports:
      - "8888:8888"
    volumes:
      - ..:/opt/project
      - ../notebooks:/opt/notebooks
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
    mem_limit: 1500m
    depends_on:
      spark-master:
        condition: service_healthy
    networks:
      - lakehouse_net

  # ===========================================================================
  # QUERY ENGINE
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Trino — federated query engine (ad-hoc analytics / BI)
  # Port:    8085 → 8080
  # Client:  DBeaver — jdbc:trino://localhost:8085/iceberg
  # UI:      http://localhost:8085
  # ---------------------------------------------------------------------------
  trino:
    image: trinodb/trino:481
    container_name: trino
    hostname: trino
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "8085:8080"
    volumes:
      - ./trino/etc:/etc/trino
      - ./trino/catalog:/etc/trino/catalog
    # heap 768m + code-cache 128m + metaspace/threads ~304m ≈ 1.2g
    mem_limit: 1200m
    depends_on:
      iceberg-rest:
        condition: service_healthy
    healthcheck:
      # /v1/info nhanh hơn chạy trino CLI — không cần client session
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/info > /dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - lakehouse_net

  # ===========================================================================
  # ORCHESTRATION — Airflow
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Airflow Init — khởi tạo DB schema + admin user (chạy 1 lần, rồi exit)
  # ---------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        python - <<'PYEOF'
        import psycopg2, os, sys
        conn = psycopg2.connect(
            host="postgres", port=5432,
            user=os.environ["POSTGRES_USER"],
            password=os.environ["POSTGRES_PASSWORD"],
            dbname=os.environ["POSTGRES_DB"]
        )
        conn.autocommit = True
        cur = conn.cursor()
        cur.execute("SELECT 1 FROM pg_database WHERE datname='airflow'")
        if not cur.fetchone():
            cur.execute("CREATE DATABASE airflow")
            print("Created airflow database")
        else:
            print("Airflow database already exists")
        conn.close()
        PYEOF
        airflow db upgrade
        airflow users create \
          --username "${AIRFLOW_ADMIN_USER:-admin}" \
          --password "${AIRFLOW_ADMIN_PASSWORD:?AIRFLOW_ADMIN_PASSWORD is required}" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email "${AIRFLOW_ADMIN_EMAIL:-admin@lakehouse.local}" || true
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${AIRFLOW_DB:-airflow}
      _AIRFLOW_DB_MIGRATE: "true"
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Airflow Webserver — DAG UI
  # Port:    8080
  # UI:      http://localhost:8080  (credentials from docker/.env)
  # ---------------------------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    mem_limit: 800m
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      spark-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Airflow Scheduler — trigger tasks theo schedule
  # mem_limit=1300m: Spark driver (512m + 192m overhead) + scheduler base ~400m + buffer 196m
  # ---------------------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    mem_limit: 1300m
    depends_on:
      airflow-init:
        condition: service_completed_successfully

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  oracle-data:       # Oracle XE datafiles
    driver: local
  postgres-data:     # PostgreSQL data
    driver: local
  minio-data:        # MinIO object storage (Iceberg parquet + airflow logs)
    driver: local
  airflow-logs:      # Airflow task logs local staging
    driver: local
  spark-work-1:      # Executor work dir worker-1
    driver: local

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  lakehouse_net:
    driver: bridge
    name: lakehouse_net
